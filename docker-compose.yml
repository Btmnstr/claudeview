services:
  claudeview:
    build: .
    ports:
      # Host port is overridable; 4790 avoids the common 3000/4000 collisions.
      - "${CLAUDEVIEW_HOST_PORT:-4790}:4790"
    volumes:
      - ./content:/content
    environment:
      WATCH_DIR: /content
      PORT: "4790"
      POLL_MS: "1000"
    restart: unless-stopped
