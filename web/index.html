<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaudeView</title>
  <script>
    // Resolve the theme before first paint so there is no light/dark flash:
    // a saved manual choice wins, otherwise follow the OS preference.
    (function () {
      var saved = localStorage.getItem("claudeview-theme");
      var dark = saved ? saved === "dark"
                       : matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    })();
  </script>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body>
  <div id="app"></div>
  <script src="/assets/elm.js"></script>
  <script>
    // Renders a server-produced HTML string. Elm sets `docName` (which document)
    // and `content` (its HTML). The element remembers each document's scroll
    // position for the life of the page, so switching tabs and coming back lands
    // you where you left off. Positions live in a per-instance Map; because Elm
    // reuses this one element across every switch, the Map survives with it.
    customElements.define("raw-html", class extends HTMLElement {
      constructor() {
        super();
        this._scrolls = new Map();   // doc name -> scrollTop, this session only
        this._doc = null;
        // Continuously record the displayed document's position, so the outgoing
        // one is already saved by the time we switch away, and tell Elm whether we
        // are at the top so it can auto-pin the reader off the top.
        this.addEventListener("scroll", () => {
          if (this._doc !== null) this._scrolls.set(this._doc, this.scrollTop);
          this._reportTop();
        });
      }

      // `app` is the hoisted Elm handle below; guarded because the first content
      // apply can run before it is assigned.
      _reportTop() {
        if (app && app.ports.scrollState) app.ports.scrollState.send(this.scrollTop <= 8);
      }

      set docName(value) { this._nextDoc = value; this._schedule(); }
      set content(value) { this._nextHtml = value; this._schedule(); }
      get content() { return this._content; }

      // Elm sets docName and content in the same DOM patch; coalesce them into a
      // single apply so restore runs once, after both are set — order-independent.
      _schedule() {
        if (this._queued) return;
        this._queued = true;
        queueMicrotask(() => {
          this._queued = false;
          if (this._nextHtml !== this._content) {
            this._content = this._nextHtml;
            this.innerHTML = this._content;
          }
          // Restore only on a real switch; a same-doc content update (an SSE
          // rewrite of the doc you're reading) keeps its position, not top.
          if (this._nextDoc !== this._doc) {
            this._doc = this._nextDoc;
            this.scrollTop = this._scrolls.get(this._doc) || 0;
          }
          // Report after applying, so restoring a scrolled doc re-pins it and a
          // fresh top-of-doc reports unpinned.
          this._reportTop();
        });
      }
    });

    // Hand the resolved theme to Elm as a flag; Elm owns the toggle button and
    // asks us back (via the setTheme port) to apply and remember a new choice.
    var theme = document.documentElement.getAttribute("data-theme");
    var app = Elm.Main.init({ node: document.getElementById("app"), flags: theme });

    app.ports.setTheme.subscribe(function (t) {
      document.documentElement.setAttribute("data-theme", t);
      localStorage.setItem("claudeview-theme", t);
    });

    // EventSource reconnects on its own, so a server restart self-heals.
    var events = new EventSource("/events");
    events.onmessage = function (event) {
      app.ports.sseMessage.send(event.data);
    };
    events.onopen = function () {
      app.ports.sseStatus.send(true);
    };
    events.onerror = function () {
      app.ports.sseStatus.send(false);
    };

    // A backgrounded tab can be frozen or throttled, and an SSE "changed" that
    // arrives then may be dropped — the keep-alive holds the connection open, so
    // no reconnect re-syncs it and the view goes stale. Treat re-activation as a
    // sync point: refetch by replaying the same "changed" nudge Elm acts on.
    var resync = function () { app.ports.sseMessage.send("changed"); };
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") resync();
    });
    window.addEventListener("focus", resync);
  </script>
</body>
</html>
